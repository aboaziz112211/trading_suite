services:
  - type: web
    name: trading-suite
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120 --graceful-timeout 30 --keep-alive 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: REFRESH_SECONDS
        value: "30"
      - key: GH_REPO
        value: aboaziz112211/trading_suite
      - key: GH_BRANCH
        value: main
      - key: ADMIN_PASSWORD
        sync: false
      - key: GH_PAT
        sync: false
      - key: US_PUSH_TOKEN
        sync: false
      - key: SA_PUSH_TOKEN
        sync: false
      - key: CRON_TOKEN
        sync: false
