# Render Blueprint — A2A AI assistant services (one service per client site).
# In Render: New → Blueprint → connect this repo. Then set GEMINI_API_KEY (secret)
# for EACH service in the dashboard — ideally a separate key per client.
services:
  - type: web
    name: sulalat-assistant
    runtime: node
    rootDir: production
    plan: free            # ملاحظة: الخطة المجانية تنام بعد خمول → بداية باردة ~30-50ث. للإنتاج استخدم خطة مدفوعة.
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # سرّي — تضيفه يدوياً في لوحة Render (لا يُرفع على git)
      - key: SITE
        value: sulalat
      - key: MODEL
        value: gemini-2.5-flash

  - type: web
    name: roasting-house-assistant
    runtime: node
    rootDir: production
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SITE
        value: roasting_house
      - key: MODEL
        value: gemini-2.5-flash
