<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Assistant</title>
<style>
  :root{ --brand:#161616; --accent:#b0884f; --bg:#f7f6f4; --panel:#fff; --text:#181818; --line:#e6e2da; --muted:#7a7368; --userText:#fff; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:"Segoe UI",Tahoma,sans-serif;background:transparent}
  .cw{width:100%;height:100%;background:var(--panel);border:1px solid var(--line);border-radius:18px;display:flex;flex-direction:column;overflow:hidden}
  .cw-h{background:var(--brand);color:#fff;padding:13px 15px;display:flex;align-items:center;gap:11px}
  .cw-h .av{width:38px;height:38px;border-radius:50%;background:#ffffff1a;border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:19px}
  .cw-h .t{font-weight:700;line-height:1.2;font-size:15px}
  .cw-h .s{font-size:11.5px;opacity:.85}
  .cw-h .ai{margin-inline-start:auto;background:var(--accent);color:#0b0b0b;border-radius:20px;padding:3px 9px;font-size:10.5px;font-weight:800}
  .cw-b{flex:1;overflow-y:auto;padding:15px;background:var(--bg)}
  .msg{display:flex;gap:8px;margin-bottom:13px;align-items:flex-end}
  .msg .b{max-width:84%;padding:9px 12px;border-radius:15px;font-size:13.5px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word}
  .msg.bot .b{background:var(--panel);border:1px solid var(--line);border-end-start-radius:5px}
  .msg.user{flex-direction:row-reverse}
  .msg.user .b{background:var(--brand);color:var(--userText);border-end-end-radius:5px}
  .msg .mav{width:26px;height:26px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:14px;flex:none}
  .msg .b a{color:var(--accent);font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:6px;padding:9px 13px;background:var(--panel);border-top:1px solid var(--line)}
  .chips button{background:var(--bg);color:var(--accent);border:1px solid var(--line);border-radius:18px;padding:6px 11px;font-size:12px;cursor:pointer;font-weight:700;font-family:inherit}
  .cw-i{display:flex;gap:8px;padding:10px;background:var(--panel);border-top:1px solid var(--line)}
  .cw-i input{flex:1;border:1px solid var(--line);border-radius:22px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;background:var(--bg);color:var(--text)}
  .cw-i input:focus{border-color:var(--accent)}
  .cw-i button{background:var(--brand);color:#fff;border:none;width:42px;border-radius:50%;font-size:17px;cursor:pointer}
  .cw-i button:disabled{opacity:.5}
  .typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);margin:0 1px;animation:bl 1s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
</style>
</head>
<body>
  <div class="cw">
    <div class="cw-h">
      <div class="av">✦</div>
      <div><div class="t" id="hName">المساعد الذكي</div><div class="s" id="hSub">مدعوم بالذكاء الاصطناعي</div></div>
      <div class="ai">AI ✦</div>
    </div>
    <div class="cw-b" id="chat"></div>
    <div class="chips" id="chips"></div>
    <div class="cw-i">
      <input id="inp" placeholder="اكتب سؤالك…" autocomplete="off">
      <button id="send">➤</button>
    </div>
  </div>
<script>
const chat=document.getElementById('chat'),inp=document.getElementById('inp'),sendBtn=document.getElementById('send'),history=[];
const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const linkify=s=>esc(s).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
function addMsg(text,who){const d=document.createElement('div');d.className='msg '+who;d.innerHTML=(who==='bot'?'<div class="mav">✦</div>':'')+'<div class="b">'+(who==='bot'?linkify(text):esc(text))+'</div>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d;}
function typing(){const d=document.createElement('div');d.className='msg bot';d.innerHTML='<div class="mav">✦</div><div class="b typing"><span></span><span></span><span></span></div>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d;}
async function send(text){if(!text.trim())return;addMsg(text,'user');history.push({role:'user',content:text});inp.value='';sendBtn.disabled=true;const t=typing();
  try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});const data=await r.json();t.remove();const reply=data.text||'عذراً، صار خطأ. حاول مرة ثانية.';addMsg(reply,'bot');history.push({role:'assistant',content:reply});}
  catch(e){t.remove();addMsg('تعذّر الاتصال بالخادم.','bot');}finally{sendBtn.disabled=false;inp.focus();}}
sendBtn.onclick=()=>send(inp.value);
inp.addEventListener('keydown',e=>{if(e.key==='Enter')send(inp.value);});
(async()=>{try{const m=await(await fetch('/api/meta')).json();const t=m.theme||{};const r=document.documentElement.style;
  ['brand','accent','bg','panel','text','line','muted','userText'].forEach(k=>{if(t[k])r.setProperty('--'+k,t[k]);});
  if(m.name){document.getElementById('hName').textContent=m.name;}if(m.subtitle){document.getElementById('hSub').textContent=m.subtitle;}
  const c=document.getElementById('chips');(m.chips||[]).forEach(x=>{const b=document.createElement('button');b.textContent=x;b.onclick=()=>send(x);c.appendChild(b);});
  addMsg(m.greeting||'هلا فيك 👋 كيف أقدر أساعدك؟','bot');
}catch(e){addMsg('هلا فيك 👋 كيف أقدر أساعدك؟','bot');}})();
</script>
</body>
</html>
