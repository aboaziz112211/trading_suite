{% extends "base.html" %}
{% block title %}Admin · Locked{% endblock %}
{% block body %}
<section class="hero">
  <h1>🔒 Admin</h1>
  <p>Enter your access key to continue.</p>
</section>

<form class="admin-form" method="get" action="{{ url_for('admin_page') }}" style="max-width:420px">
  <label>
    <span>Access key</span>
    <input type="password" name="p" required autofocus autocomplete="off">
  </label>
  <button type="submit" class="btn">Unlock</button>
</form>
{% endblock %}
