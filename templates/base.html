<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Trading Suite{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('index') }}" class="brand">Trading Suite</a>
    <nav>
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('product_page', key='chartedge') }}">ChartEdge</a>
      <a href="{{ url_for('product_page', key='tradepulse_us') }}">TradePulse US</a>
      <a href="{{ url_for('product_page', key='tradepulse_sar') }}">TradePulse SAR</a>
    </nav>
  </header>
  <main>{% block body %}{% endblock %}</main>
</body>
</html>
